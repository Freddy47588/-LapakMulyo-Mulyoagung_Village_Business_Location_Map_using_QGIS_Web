<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" type="text/css" href="resources/horsey.min.css">
        <link rel="stylesheet" type="text/css" href="resources/ol-search-layer.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <link rel="stylesheet" href="./resources/main.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Peta Persebaran Lokasi Bisnis di Jalan MulyoAgung</title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <div id="filter-box">
    <b>Kategori Bisnis</b>
    <select id="kategori-select">
        <option value="All">Semua Lokasi</option>
        <option value="Kuliner">🍔 Kuliner</option>
        <option value="Retail">🛒 Retail</option>
        <option value="Otomotif">🔧 Otomotif</option>
        <option value="Kesehatan">🏥 Kesehatan</option>
        <option value="Jasa">🛠️ Jasa</option>
        <option value="Elektronik">💻 Elektronik</option>
        <option value="Fashion">👕 Fashion</option>
        <!-- Tambahkan kategori lain sesuai data GeoJSON jika ada -->
    </select>
</div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="resources/horsey.min.js"></script>
        <script src="resources/ol-search-layer.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/AreaDesaMulyoAgung_1.js"></script><script src="layers/JalanUtama_2.js"></script><script src="layers/LokasiTempatIbadah_3.js"></script><script src="layers/LokasiSekolah_4.js"></script><script src="layers/LokasiBisnisMulyoAgung_5.js"></script>
        <script src="styles/AreaDesaMulyoAgung_1_style.js"></script><script src="styles/JalanUtama_2_style.js"></script><script src="styles/LokasiTempatIbadah_3_style.js"></script><script src="styles/LokasiSekolah_4_style.js"></script><script src="styles/LokasiBisnisMulyoAgung_5_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>  
        <script>
    // 1. Ambil elemen dropdown
    var filterSelect = document.getElementById('kategori-select');

    // 2. Fungsi Filter
    filterSelect.onchange = function() {
        var selectedValue = this.value;
        
        // lyr_LokasiBisnisMulyoAgung_5 adalah nama variabel layer di OpenLayers kamu
        var source = lyr_LokasiBisnisMulyoAgung_5.getSource();
        var features = source.getFeatures();

        features.forEach(function(feature) {
            // Kita ambil atribut 'kategori' dari data GeoJSON kamu
            var kategoriData = feature.get('kategori');

            if (selectedValue === 'All') {
                // Tampilkan kembali semua titik jika pilih "Semua"
                feature.setStyle(undefined); 
            } else {
                if (kategoriData === selectedValue) {
                    // Tampilkan yang cocok
                    feature.setStyle(undefined); 
                } else {
                    // Sembunyikan yang tidak cocok dengan style transparan
                    feature.setStyle(new ol.style.Style({})); 
                }
            }
        });
    };
</script>     
    </body>
</html>
